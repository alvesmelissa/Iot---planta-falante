<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Histórico</title>

    <link
        rel="stylesheet"
        href="../Css/historico.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-leaf"></i>

            <h2>PlantCare</h2>

        </div>

        <button
            class="btn-planta"
            id="btnAdicionarPlanta"
        >

            <i class="fa-solid fa-plus"></i>

            Adicionar Planta

        </button>

        <nav class="menu">

            <a href="home.html">

                <i class="fa-solid fa-house"></i>

                Home

            </a>

            <a
                href="historico.html"
                class="ativo"
            >

                <i class="fa-solid fa-clock-rotate-left"></i>

                Histórico

            </a>

            <a href="quiz.html">

                <i class="fa-solid fa-seedling"></i>

                Quiz de planta

            </a>

            <a href="login.html">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="container">

        <!-- TOPO -->

        <header class="topo">

            <div
                class="planta-select"
                id="plantaSelect"
            >

                <img
                    src="../img/feliz/cactomuitofeliz.png"
                    alt="Planta"
                    id="iconePequeno"
                >

                <span id="nomePlantaTopo">

                    Minha Planta

                </span>

                <i class="fa-solid fa-chevron-down"></i>

                <div
                    class="dropdown-plantas"
                    id="dropdownPlantas"
                >

                    <div class="dropdown-header">

                        Suas plantas

                    </div>

                    <div id="listaPlantas">

                    </div>

                    <button
                        id="btnNovaPlanta"
                        class="btn-dropdown"
                    >

                        <i class="fa-solid fa-plus"></i>

                        Adicionar planta

                    </button>

                </div>

            </div>

            <div class="perfil-topo">

                <div
                    class="foto-perfil-container"
                    title="Perfil"
                >

                    <img
                        src="../img/icones/perfil.png"
                        alt="Perfil"
                        class="foto-perfil"
                    >

                </div>

            </div>

        </header>

        <!-- CABEÇALHO -->

        <section class="cabecalho-historico">

            <div>

                <h1>

                    Histórico da Planta

                </h1>

                <p>

                    Acompanhe todos os eventos registrados da sua planta.

                </p>

            </div>

        </section>

        <!-- TIMELINE -->

        <section class="card timeline-card">

            <div class="card-header">

                <i class="fa-solid fa-clock-rotate-left"></i>

                <h2>Linha do Tempo</h2>

            </div>

            <div
                id="timeline"
                class="timeline"
            >

                <div class="estado-vazio">

                    <i class="fa-solid fa-seedling"></i>

                    <h3>

                        Nenhum evento registrado

                    </h3>

                    <p>

                        Os acontecimentos da sua planta aparecerão aqui.

                    </p>

                </div>

            </div>

        </section>

    </main>

    <script src="../Js/configuracao.js"></script>

    <script src="../Js/historico.js"></script>

</body>

</html>
