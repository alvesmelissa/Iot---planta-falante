<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../Css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- SIDEBAR -->
<aside class="sidebar">

    <div class="logo">
        <i class="fa-solid fa-leaf"></i>
        <h2>PlantCare</h2>
    </div>

    <nav class="menu">

        <a href="home.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="historico.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Histórico
        </a>

        <a href="perfil.html">
            <i class="fa-solid fa-seedling"></i>
            Perfil de planta
        </a>

        <a href="login.html" class="ativo">
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
        </a>

    </nav>

</aside>
    <!-- CONTEÚDO -->
    <main class="container">

        <section class="login">

            <div class="titulo">
                <h1>Entrar</h1>

                <p>
                    Faça login para acessar sua plantinha virtual
                </p>
            </div>

            <form id="form-login">

                <div class="campo">
                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu e-mail"
                    >
                </div>

                <div class="campo">
                    <label for="senha">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                    >
                </div>

                <button
                    type="submit"
                    class="btn-login"
                >
                    Entrar
                </button>

            </form>

            <div class="cadastro">

                <p>
                    Ainda não possui conta?
                </p>

                <a href="cadastro.html">
                    Criar conta
                </a>

            </div>

        </section>

    </main>

    <script src="../Js/configuracao.js"></script>
    <script src="../Js/login.js"></script>

</body>

</html>
