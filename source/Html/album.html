<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>album de fotos</title>

    <link rel="stylesheet" href="../Css/album.css">
</head>

<body>
    <nav>
        <a href="quiz.html">Perfil</a>
        <a href="home.html">Home</a> 
        <a href="historico.html">Histórico</a>
    </nav>

    <main class="container">
        <section class="album">
            <div class="titulo">
                <h1>Álbum de Registros</h1>
                <p>Acompanhe por fotos as alterações das plantinhas</p>
            </div>

            <section class="album-registro">
                <form id="form-album">
                    <div class="campo">
                        <label for= "foto">
                            Selecione uma foto:
                        </label>

                        <input type="file" id="foto" accept="image/*">
                    </div>

                    <div class="campo">
                        <label for= "estado">
                            Qual a aparência da sua planta?
                        </label>

                        <select id="estado">
                            <option value="">Selecione</option>
                            <option value="excesso-agua">Folhas amareladas</option>
                            <option value="falta-agua">Folhas murchas</option>
                            <option value="pouco-sol">Folhas verde claro</option>
                            <option value="muito-sol">Manchas marrons e secas</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="descricao">Adcione uma descrição:</label>
                        <textarea id="descricao" rows="5" required></textarea>            
                    </div>

                    <button class="btn-iniciar" type="submit">Salvar</button>
                </form>
            </section>

            <section class="historico-album" id="historico-album">
                <h2>Registros Salvos</h2>
            </section>
        </section>
    </main>

    <script src="../Js/album.js"></script>
</body>

</html>
