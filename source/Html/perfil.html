<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informacao Da Planta</title>

    <link rel="stylesheet" href="../Css/perfil.css">
</head>

<body>
    <nav>
        <a href="login.html">Login</a>
        <a href="home.html">Home</a>        
        <a href="historico.html">Histórico</a>
        <a href="album.html">Álbum</a>
    </nav>

    <main class="container">
        <section class="quiz">
            <div class="titulo">
                <h1>Responda as perguntas</h1>
                <p>Vamos conhecer você e sua plantinha!</p>
            </div>

            <form id="form-quiz">
                <div class="pergunta">
                    <label for="planta">Qual é o nome da sua planta?</label>
                    <input type="text" id="planta" placeholder="Digite o nome da planta">
                </div>

                <div class="pergunta">
                    <label for="tipo">Sua planta é de:</label>
                    <select id="tipo">
                        <option value="">Selecione</option>
                        <option value="SOL">Sol</option>
                        <option value="SOMBRA">Sombra</option>
                        <option value="SOMBRA">Meia sombra</option>
                    </select>
                </div>

                <div class="pergunta">
                    <label>Escolha um ícone para representar sua planta:</label>

                    <div class="icones">
                        <button type="button" class="icone" data-planta="Babosa">
                            <img src="../img/icones/Babosa.png" alt="Babosa">
                        </button>

                        <button type="button" class="icone" data-planta="Bambu">
                            <img src="../img/icones/Bambu.png" alt="Bambu">
                        </button>

                        <button type="button" class="icone" data-planta="Cacto">
                            <img src="../img/icones/Cacto.png" alt="Cacto">
                        </button>
                        
                        <button type="button" class="icone" data-planta="Carnívora">
                            <img src="../img/icones/Carnívora.png" alt="Carnívora">
                        </button>

                        <button type="button" class="icone" data-planta="Costela de Adão">
                            <img src="../img/icones/Costela de Adão.png" alt="Costela de Adão">
                        </button>

                        <button type="button" class="icone" data-planta="Espada de São Jorge">
                            <img src="../img/icones/Espada de São Jorge.png" alt="Espada de São Jorge">
                        </button>

                        <button type="button" class="icone" data-planta="Girassol">
                            <img src="../img/icones/Girassol.png" alt="Girassol">
                        </button>

                        <button type="button" class="icone" data-planta="Hibisco">
                            <img src="../img/icones/Hibisco.png" alt="Hibisco">
                        </button>

                        <button type="button" class="icone" data-planta="Jade">
                            <img src="../img/icones/Jade.png" alt="Jade">
                        </button>

                        <button type="button" class="icone" data-planta="Jiboia">
                            <img src="../img/icones/Jiboia.png" alt="Jiboia">
                        </button>

                        <button type="button" class="icone" data-planta="Lavanda">
                            <img src="../img/icones/Lavanda.png" alt="Lavanda">
                        </button>

                        <button type="button" class="icone" data-planta="Lírio da Paz">
                            <img src="../img/icones/Lirio da Paz.png" alt="Lírio da Paz">
                        </button>

                        <button type="button" class="icone" data-planta="Orquídea">
                            <img src="../img/icones/Orquídea.png" alt="Orquídea">
                        </button>

                        <button type="button" class="icone" data-planta="Samambaia">
                            <img src="../img/icones/Samambaia.png" alt="Samambaia">
                        </button>

                        <button type="button" class="icone" data-planta="Suculenta">
                            <img src="../img/icones/Suculenta.png" alt="Suculenta">
                        </button>

                        <button type="button" class="icone" data-planta="Zamioculca">
                            <img src="../img/icones/Zamioculca.png" alt="Zamioculca">
                        </button>
                    </div>
                </div>

                <div class="pergunta">
                    <label for="lugar">Onde sua planta fica?</label>

                    <select id="lugar">
                        <option value="">Selecione</option>
                        <option value="casa">Dentro de casa</option>
                        <option value="externa">Área externa</option>
                        <option value="janela">Perto da janela</option>
                    </select>
                </div>

                <div class="pergunta">
                    <label for="rega">Com que frequência você costuma regar?</label>

                    <select id="rega">
                        <option value="">Selecione</option>
                        <option value="todos-dias">Todos os dias</option>
                        <option value="2-3-semana">2 ou 3 vezes na semana</option>
                         <option value="raramente">Raramente</option>
                    </select>
                </div>

                <button class="btn-iniciar" type="submit">Salvar</button>
            </form>
        </section>
    </main>

    <script src="../Js/perfil.js"></script>    
</body>

</html>
