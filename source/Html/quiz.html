<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perfil</title>

    <link rel="stylesheet" href="../Css/quiz.css">
</head>

<body>
    <nav>
        <a href="home.html">Home</a>        
        <a href="historico.html">Histórico</a>
        <a href="album.html">Álbum</a>
    </nav>

    <main class="container">
        <section class="quiz">
            <div class="titulo">
                <h1>Responda as perguntas</h1>
                <p>Vamos conhecer você e sua plantinha!</p>
            </div>

            <form id="form-quiz">
                <div class="pergunta">
                    <label for="usuario">Como você gostaria de ser chamado?</label>
                    <input type="text" id="usuario" placeholder="Digite seu nome">
                </div>

                <div class="pergunta">
                    <label for="planta">Qual é o nome da sua planta?</label>
                    <input type="text" id="planta" placeholder="Digite o nome da planta">
                </div>

                <div class="pergunta">
                    <label for="tipo">Sua planta é de:</label>
                    <select id="tipo">
                        <option value="">Selecione</option>
                        <option value="sol">Sol</option>
                        <option value="sombra">Sombra</option>
                        <option value="meia-sombra">Meia sombra</option>
                    </select>
                </div>

                <div class="pergunta">
                    <label>Escolha um ícone para representar sua planta:</label>

                    <div class="icones">
                        <button type="button" class="icone">🌱</button>
                        <button type="button" class="icone">🌵</button>
                        <button type="button" class="icone">🌷</button>
                        <button type="button" class="icone">🍀</button>
                    </div>
                </div>

                <div class="pergunta">
                    <label for="lugar">Onde sua planta fica?</label>

                    <select id="lugar">
                        <option value="">Selecione</option>
                        <option value="casa">Dentro de casa</option>
                        <option value="externa">Área externa</option>
                        <option value="janela">Perto da janela</option>
                    </select>
                </div>

                <div class="pergunta">
                    <label for="rega">Com que frequência você costuma regar?</label>

                    <select id="rega">
                        <option value="">Selecione</option>
                        <option value="todos-dias">Todos os dias</option>
                        <option value="2-3-semana">2 ou 3 vezes na semana</option>
                         <option value="raramente">Raramente</option>
                    </select>
                </div>

                <button class="btn-iniciar" type="submit">Salvar</button>
            </form>
        </section>
    </main>

    <script src="../Js/quiz.js"></script>    
</body>

</html>
